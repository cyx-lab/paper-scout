name: Daily Paper Scout Email

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-and-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      MY_API_KEY: ${{ secrets.MY_API_KEY }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime .env
        run: |
          cp .env.defaults .env
          {
            echo "MY_API_KEY=${MY_API_KEY}"
            echo "SMTP_USER=${SMTP_USER}"
            echo "SMTP_PASSWORD=${SMTP_PASSWORD}"
            echo "EMAIL_TO=${EMAIL_TO}"
          } >> .env
          if [ -n "${EMAIL_FROM}" ]; then
            echo "EMAIL_FROM=${EMAIL_FROM}" >> .env
          fi

      - name: Print safe runtime config
        run: |
          python - <<'PY'
          import os
          from dotenv import load_dotenv
          load_dotenv(".env")
          print("MY_API_BASE_URL =", os.getenv("MY_API_BASE_URL", ""))
          print("LLM_MODEL =", os.getenv("LLM_MODEL", ""))
          print("LLM_WORKERS =", os.getenv("LLM_WORKERS", ""))
          print("LLM_MAX_API_RETRIES =", os.getenv("LLM_MAX_API_RETRIES", ""))
          print("LLM_RETRY_BASE_SLEEP =", os.getenv("LLM_RETRY_BASE_SLEEP", ""))
          print("LLM_RETRY_MAX_SLEEP =", os.getenv("LLM_RETRY_MAX_SLEEP", ""))
          print("SMTP_HOST =", os.getenv("SMTP_HOST", ""))
          print("SMTP_PORT =", os.getenv("SMTP_PORT", ""))
          print("MY_API_KEY is set =", bool(os.getenv("MY_API_KEY")))
          print("EMAIL_TO is set =", bool(os.getenv("EMAIL_TO")))
          print("SMTP_PASSWORD is set =", bool(os.getenv("SMTP_PASSWORD")))
          PY

      - name: Healthcheck LLM API
        run: python scripts/healthcheck_llm_api.py

      - name: Run pipeline
        run: python run_all.py

      - name: Print PDF error logs on failure
        if: failure()
        run: |
          echo "=== pandoc stderr files ==="
          find reports/log -name "*.pandoc_stderr.txt" -print -exec sh -c 'echo "--- $1 ---"; cat "$1"' _ {} \; || true
          echo "=== available fonts (filtered) ==="
          fc-list | grep -Ei "Noto|WenQuanYi|AR PL|DejaVu|Liberation" || true

      - name: Commit downloaded papers and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/pdfs reports
          if git diff --cached --quiet; then
            echo "No generated files to commit."
            exit 0
          fi
          git commit -m "Add generated papers and reports for $(date +%F)"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Email reports
        run: python scripts/send_email.py
