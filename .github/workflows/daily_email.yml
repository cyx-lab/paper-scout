name: Daily Paper Scout Email

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-and-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      MY_API_KEY: ${{ secrets.MY_API_KEY }}
      MY_API_BASE_URL: ${{ secrets.MY_API_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_SUBJECT_PREFIX: ${{ secrets.EMAIL_SUBJECT_PREFIX }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Print safe runtime config
        run: |
          python - <<'PY'
          import os
          print("MY_API_BASE_URL =", os.getenv("MY_API_BASE_URL", ""))
          print("LLM_MODEL =", os.getenv("LLM_MODEL", ""))
          print("LLM_WORKERS =", os.getenv("LLM_WORKERS", ""))
          print("LLM_MAX_API_RETRIES =", os.getenv("LLM_MAX_API_RETRIES", ""))
          print("LLM_RETRY_BASE_SLEEP =", os.getenv("LLM_RETRY_BASE_SLEEP", ""))
          print("LLM_RETRY_MAX_SLEEP =", os.getenv("LLM_RETRY_MAX_SLEEP", ""))
          print("SMTP_HOST =", os.getenv("SMTP_HOST", ""))
          print("SMTP_PORT =", os.getenv("SMTP_PORT", ""))
          print("MY_API_KEY is set =", bool(os.getenv("MY_API_KEY")))
          print("EMAIL_TO is set =", bool(os.getenv("EMAIL_TO")))
          print("SMTP_PASSWORD is set =", bool(os.getenv("SMTP_PASSWORD")))
          PY

      - name: Run pipeline
        run: python run_all.py

      - name: Email reports
        run: python scripts/send_email.py
